name: Bug report
description: Report a problem in the starter app, workflow, templates, or repo setup
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App shell
        - Templates
        - Workflow docs
        - AI skills
        - CI or GitHub setup
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Logs, screenshots, or related files
